apiVersion: apps/v1
kind: Deployment
metadata:
  name: summarize-service
  namespace: distributed-logs
  labels: { app: summarize-service }
spec:
  replicas: 1
  selector:
    matchLabels: { app: summarize-service }
  template:
    metadata:
      labels: { app: summarize-service }
    spec:
      containers:
        - name: summarize-service
          image: ${ECR_REGISTRY}/distributed-logs/summarize-service:${IMAGE_TAG}
          ports:
            - containerPort: 8081
              name: http
          env:
            - name: HTTP_ADDR
              value: ":8081"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef: { name: app-secrets, key: ANTHROPIC_API_KEY }
          readinessProbe:
            httpGet: { path: /health, port: 8081 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8081 }
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 256Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: summarize-service
  namespace: distributed-logs
spec:
  selector: { app: summarize-service }
  ports:
    - port: 8081
      targetPort: 8081
      name: http
  type: ClusterIP
