# Demo producer: tails the sample logs mounted from the `sample-logs` ConfigMap
# (generated by deploy.sh from ./testlogs) and ships them to index-service.
# In a real deployment you'd run this as a DaemonSet tailing each node's logs.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-client
  namespace: distributed-logs
  labels: { app: log-client }
spec:
  replicas: 1
  selector:
    matchLabels: { app: log-client }
  template:
    metadata:
      labels: { app: log-client }
    spec:
      containers:
        - name: log-client
          image: ${ECR_REGISTRY}/distributed-logs/log-client:${IMAGE_TAG}
          args:
            - "-server"
            - "index-service:50051"
            - "-path"
            - "/logs"
            - "-interval"
            - "10s"
            - "-summarize-addr"
            - "summarize-service:8081"
          volumeMounts:
            - name: logs
              mountPath: /logs
              readOnly: true
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 200m, memory: 128Mi }
      volumes:
        - name: logs
          configMap:
            name: sample-logs
