# index-service runs under this SA so it can archive raw logs to S3 via IRSA.
# The role-arn comes from the Terraform output `log_archive_role_arn`.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: index-service
  namespace: distributed-logs
  annotations:
    eks.amazonaws.com/role-arn: ${LOG_ARCHIVE_ROLE_ARN}
